# Gentoo Binhost - amd64/23.0/desktop/plasma (OpenRC)
# Built on GitHub Actions (x86-64-v3 baseline)

COMMON_FLAGS="-march=x86-64-v3 -O2 -pipe"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"

# Testing branch to stay in sync with source ebuilds
ACCEPT_KEYWORDS="~amd64"

# CPU flags for x86-64-v3 baseline (compatible with most modern CPUs ~2015+)
CPU_FLAGS_X86="aes avx avx2 f16c fma3 mmx mmxext pclmul popcnt sse sse2 sse3 sse4_1 sse4_2 ssse3"

# Profile USE flags
USE="X wayland kde plasma qt6 elogind openrc -systemd"
USE="${USE} pulseaudio pipewire jack alsa"
USE="${USE} vulkan opengl opencl openal openexr"
USE="${USE} ffmpeg v4l x265 heif jpeg2k gphoto2 theora matroska wavpack"
USE="${USE} dbus networkmanager bluetooth cups"
USE="${USE} -abi_x86_32"

# Binary package settings
FEATURES="buildpkg binpkg-multi-instance parallel-fetch ccache"
BINPKG_FORMAT="gpkg"
BINPKG_COMPRESS="zstd"

# Build performance
MAKEOPTS="-j$(nproc)"
EMERGE_DEFAULT_OPTS="--jobs=2 --load-average=$(nproc) --binpkg-respect-use=y --with-bdeps=y"

# ccache
CCACHE_DIR="/var/cache/ccache"

# Video/Input (generic for CI)
VIDEO_CARDS="amdgpu radeonsi intel nouveau"
INPUT_DEVICES="libinput wacom"

ACCEPT_LICENSE="-* @FREE @BINARY-REDISTRIBUTABLE"

LLVM_TARGETS="AMDGPU X86"

GRUB_PLATFORMS="efi-64 pc"

PYTHON_TARGETS="python3_12 python3_13"
PYTHON_SINGLE_TARGET="python3_13"
