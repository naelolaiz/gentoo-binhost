name: Build Tier 1 - Monsters

on:
  schedule:
    # Every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      package:
        description: 'Single package to build (leave empty to build all tier1 packages)'
        required: false
        default: ''

permissions:
  contents: read
  pages: write
  id-token: write

env:
  # Our own binhost first (custom USE flags), then official Gentoo x86-64-v3 as fallback
  BINHOST_URLS: >-
    https://naelolaiz.github.io/gentoo-binhost/amd64/23.0/desktop/plasma/openrc/x86-64-v3
    https://distfiles.gentoo.org/releases/amd64/binpackages/23.0/x86-64-v3/

# Build order:
#   1. "shared-deps" — llvm-core/* packages built together in ONE job
#      (avoids 4 parallel jobs all compiling the same LLVM)
#   2. "consumers"   — qtwebengine, webkit-gtk built in parallel,
#      downloading shared-deps binpkgs so they skip LLVM compilation

jobs:
  # ───────────────────────────────────────────────────────────────
  # Prepare: split tier1 packages into shared deps and consumers
  # ───────────────────────────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      build_shared: ${{ steps.set-matrix.outputs.build_shared }}
      shared_packages: ${{ steps.set-matrix.outputs.shared_packages }}
      has_consumers: ${{ steps.set-matrix.outputs.has_consumers }}
      consumer_matrix: ${{ steps.set-matrix.outputs.consumer_matrix }}
    steps:
      - uses: actions/checkout@v6

      - name: Build package matrices
        id: set-matrix
        run: |
          if [[ -n "${{ github.event.inputs.package }}" ]]; then
            PKG="${{ github.event.inputs.package }}"
            # Route llvm-core/* packages through the shared-deps path
            if [[ "$PKG" == llvm-core/* ]]; then
              {
                echo "build_shared=true"
                echo "shared_packages=${PKG}"
                echo "has_consumers=false"
                echo 'consumer_matrix={"package":["_skip_"]}'
              } >> "$GITHUB_OUTPUT"
            else
              {
                echo "build_shared=false"
                echo "shared_packages="
                echo "has_consumers=true"
                echo "consumer_matrix={\"package\":[\"${PKG}\"]}"
              } >> "$GITHUB_OUTPUT"
            fi
          else
            # Full build: split tier1 list into shared deps (llvm-core/*) and consumers
            SHARED=$(awk '!/^[[:space:]]*#/ && !/^[[:space:]]*$/ && /^llvm-core\//' packages/tier1-monsters.txt)
            CONSUMERS=$(awk '!/^[[:space:]]*#/ && !/^[[:space:]]*$/ && !/^llvm-core\//' packages/tier1-monsters.txt \
                         | jq -R . | jq -sc .)

            if [[ -n "$SHARED" ]]; then
              {
                echo "build_shared=true"
                # Use heredoc for multiline output
                echo "shared_packages<<PKGEOF"
                echo "$SHARED"
                echo "PKGEOF"
              } >> "$GITHUB_OUTPUT"
            else
              {
                echo "build_shared=false"
                echo "shared_packages="
              } >> "$GITHUB_OUTPUT"
            fi

            if [[ "$CONSUMERS" != "[]" && -n "$CONSUMERS" ]]; then
              {
                echo "has_consumers=true"
                echo "consumer_matrix={\"package\":${CONSUMERS}}"
              } >> "$GITHUB_OUTPUT"
            else
              {
                echo "has_consumers=false"
                echo 'consumer_matrix={"package":["_skip_"]}'
              } >> "$GITHUB_OUTPUT"
            fi
          fi

  # ───────────────────────────────────────────────────────────────
  # Stage 1: Build shared deps (llvm + clang) in a SINGLE job
  # ───────────────────────────────────────────────────────────────
  build-shared-deps-phase-1:
    needs: prepare
    if: needs.prepare.outputs.build_shared == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 355
    env:
      CCACHE_SIZE: 20G

    container:
      image: gentoo/stage3:latest
      options: --privileged

    steps:
      - uses: actions/checkout@v6

      - name: Restore ccache
        uses: actions/cache/restore@v5
        with:
          path: /var/cache/ccache
          key: ccache-v2-tier1-shared-deps-${{ github.sha }}
          restore-keys: |
            ccache-v2-tier1-shared-deps-
            ccache-v2-tier1-

      - name: Import GPG signing key
        run: |
          if [[ -n "${GPG_PRIVATE_KEY:-}" ]]; then
            echo "$GPG_PRIVATE_KEY" \
              | gpg --batch --passphrase "${GPG_PASSPHRASE:-}" \
                    --import
          fi
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Sync portage tree
        run: |
          emerge-webrsync --quiet 2>/dev/null \
            || emerge --sync --quiet \
            || emaint sync -a
          eselect profile set default/linux/amd64/23.0/desktop/plasma || true

      - name: Install build tools
        run: |
          emerge --oneshot --quiet dev-util/ccache app-portage/gentoolkit

      - name: Create shared deps package list
        run: |
          echo "$SHARED_PACKAGES" > /tmp/shared-deps.txt
          echo "Shared deps to build:"
          cat /tmp/shared-deps.txt
        env:
          SHARED_PACKAGES: ${{ needs.prepare.outputs.shared_packages }}

      - name: Build shared deps (phase 1)
        id: build
        run: |
          set +e
          bash scripts/build.sh \
            --profile amd64-23.0-desktop-plasma-openrc \
            --package-list /tmp/shared-deps.txt \
            --binhost-url "${{ env.BINHOST_URLS }}" \
            --state-dir /var/tmp/portage-state \
            --max-build-time 330 \
            ${{ secrets.GPG_PRIVATE_KEY != '' && '--sign' || '' }} \
            ${{ secrets.GPG_PRIVATE_KEY != '' && format('--gpg-key {0}', secrets.GPG_KEY_FINGERPRINT) || '' }} \
            --output-dir /tmp/binpkgs
          BUILD_EXIT=$?
          echo "exit_code=${BUILD_EXIT}" >> "$GITHUB_OUTPUT"
          if [[ $BUILD_EXIT -ne 0 && $BUILD_EXIT -ne 42 ]]; then
            exit $BUILD_EXIT
          fi

      - name: Save build state to cache (timed out)
        if: steps.build.outputs.exit_code == '42'
        uses: actions/cache/save@v5
        with:
          path: /var/tmp/portage-state
          key: build-state-tier1-shared-deps-${{ github.run_id }}-phase-1

      - name: Save ccache after phase 1
        uses: actions/cache/save@v5
        if: always()
        with:
          path: /var/cache/ccache
          key: ccache-v2-tier1-shared-deps-${{ github.sha }}-${{ github.run_id }}-ph1

      - name: Upload packages as artifacts (shared deps phase 1)
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: binpkgs-tier1-shared-phase1
          path: /tmp/binpkgs/**/*.gpkg.tar
          if-no-files-found: warn
          retention-days: 7

  build-shared-deps-phase-2:
    needs: [prepare, build-shared-deps-phase-1]
    runs-on: ubuntu-latest
    timeout-minutes: 355
    if: >-
      always() &&
      needs.prepare.outputs.build_shared == 'true' &&
      needs.build-shared-deps-phase-1.result == 'success'
    env:
      CCACHE_SIZE: 20G

    container:
      image: gentoo/stage3:latest
      options: --privileged

    steps:
      - uses: actions/checkout@v6

      - name: Restore build state from phase 1
        id: restore-state
        uses: actions/cache/restore@v5
        with:
          path: /var/tmp/portage-state
          key: build-state-tier1-shared-deps-${{ github.run_id }}-phase-1
          fail-on-cache-miss: false

      - name: Restore ccache
        if: steps.restore-state.outputs.cache-hit == 'true'
        uses: actions/cache/restore@v5
        with:
          path: /var/cache/ccache
          key: ccache-v2-tier1-shared-deps-${{ github.sha }}-${{ github.run_id }}-ph1
          restore-keys: |
            ccache-v2-tier1-shared-deps-${{ github.sha }}-
            ccache-v2-tier1-shared-deps-
            ccache-v2-tier1-

      - name: Import GPG signing key
        if: steps.restore-state.outputs.cache-hit == 'true'
        run: |
          if [[ -n "${GPG_PRIVATE_KEY:-}" ]]; then
            echo "$GPG_PRIVATE_KEY" \
              | gpg --batch --passphrase "${GPG_PASSPHRASE:-}" \
                    --import
          fi
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Sync portage tree
        if: steps.restore-state.outputs.cache-hit == 'true'
        run: |
          emerge-webrsync --quiet 2>/dev/null \
            || emerge --sync --quiet \
            || emaint sync -a
          eselect profile set default/linux/amd64/23.0/desktop/plasma || true

      - name: Install build tools
        if: steps.restore-state.outputs.cache-hit == 'true'
        run: |
          emerge --oneshot --quiet dev-util/ccache app-portage/gentoolkit

      - name: Create shared deps package list
        if: steps.restore-state.outputs.cache-hit == 'true'
        run: |
          echo "$SHARED_PACKAGES" > /tmp/shared-deps.txt
        env:
          SHARED_PACKAGES: ${{ needs.prepare.outputs.shared_packages }}

      - name: Build shared deps (phase 2)
        id: build
        if: steps.restore-state.outputs.cache-hit == 'true'
        run: |
          set +e
          bash scripts/build.sh \
            --profile amd64-23.0-desktop-plasma-openrc \
            --package-list /tmp/shared-deps.txt \
            --binhost-url "${{ env.BINHOST_URLS }}" \
            --resume \
            --state-dir /var/tmp/portage-state \
            --max-build-time 330 \
            ${{ secrets.GPG_PRIVATE_KEY != '' && '--sign' || '' }} \
            ${{ secrets.GPG_PRIVATE_KEY != '' && format('--gpg-key {0}', secrets.GPG_KEY_FINGERPRINT) || '' }} \
            --output-dir /tmp/binpkgs
          BUILD_EXIT=$?
          echo "exit_code=${BUILD_EXIT}" >> "$GITHUB_OUTPUT"
          if [[ $BUILD_EXIT -ne 0 && $BUILD_EXIT -ne 42 ]]; then
            exit $BUILD_EXIT
          fi

      - name: Save build state to cache (timed out)
        if: steps.build.outputs.exit_code == '42'
        uses: actions/cache/save@v5
        with:
          path: /var/tmp/portage-state
          key: build-state-tier1-shared-deps-${{ github.run_id }}-phase-2

      - name: Save ccache after phase 2
        if: steps.restore-state.outputs.cache-hit == 'true'
        uses: actions/cache/save@v5
        with:
          path: /var/cache/ccache
          key: ccache-v2-tier1-shared-deps-${{ github.sha }}-${{ github.run_id }}-ph2

      - name: Upload packages as artifacts (shared deps phase 2)
        uses: actions/upload-artifact@v7
        if: always() && steps.restore-state.outputs.cache-hit == 'true'
        with:
          name: binpkgs-tier1-shared-phase2
          path: /tmp/binpkgs/**/*.gpkg.tar
          if-no-files-found: warn
          retention-days: 7

  build-shared-deps-phase-3:
    needs: [prepare, build-shared-deps-phase-2]
    runs-on: ubuntu-latest
    timeout-minutes: 355
    if: >-
      always() &&
      needs.prepare.outputs.build_shared == 'true' &&
      needs.build-shared-deps-phase-2.result == 'success'
    env:
      CCACHE_SIZE: 20G

    container:
      image: gentoo/stage3:latest
      options: --privileged

    steps:
      - uses: actions/checkout@v6

      - name: Restore build state from phase 2
        id: restore-state
        uses: actions/cache/restore@v5
        with:
          path: /var/tmp/portage-state
          key: build-state-tier1-shared-deps-${{ github.run_id }}-phase-2
          fail-on-cache-miss: false

      - name: Restore ccache
        if: steps.restore-state.outputs.cache-hit == 'true'
        uses: actions/cache/restore@v5
        with:
          path: /var/cache/ccache
          key: ccache-v2-tier1-shared-deps-${{ github.sha }}-${{ github.run_id }}-ph2
          restore-keys: |
            ccache-v2-tier1-shared-deps-${{ github.sha }}-
            ccache-v2-tier1-shared-deps-
            ccache-v2-tier1-

      - name: Import GPG signing key
        if: steps.restore-state.outputs.cache-hit == 'true'
        run: |
          if [[ -n "${GPG_PRIVATE_KEY:-}" ]]; then
            echo "$GPG_PRIVATE_KEY" \
              | gpg --batch --passphrase "${GPG_PASSPHRASE:-}" \
                    --import
          fi
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Sync portage tree
        if: steps.restore-state.outputs.cache-hit == 'true'
        run: |
          emerge-webrsync --quiet 2>/dev/null \
            || emerge --sync --quiet \
            || emaint sync -a
          eselect profile set default/linux/amd64/23.0/desktop/plasma || true

      - name: Install build tools
        if: steps.restore-state.outputs.cache-hit == 'true'
        run: |
          emerge --oneshot --quiet dev-util/ccache app-portage/gentoolkit

      - name: Create shared deps package list
        if: steps.restore-state.outputs.cache-hit == 'true'
        run: |
          echo "$SHARED_PACKAGES" > /tmp/shared-deps.txt
        env:
          SHARED_PACKAGES: ${{ needs.prepare.outputs.shared_packages }}

      - name: Build shared deps (phase 3)
        id: build
        if: steps.restore-state.outputs.cache-hit == 'true'
        run: |
          set +e
          bash scripts/build.sh \
            --profile amd64-23.0-desktop-plasma-openrc \
            --package-list /tmp/shared-deps.txt \
            --binhost-url "${{ env.BINHOST_URLS }}" \
            --resume \
            --state-dir /var/tmp/portage-state \
            --max-build-time 330 \
            ${{ secrets.GPG_PRIVATE_KEY != '' && '--sign' || '' }} \
            ${{ secrets.GPG_PRIVATE_KEY != '' && format('--gpg-key {0}', secrets.GPG_KEY_FINGERPRINT) || '' }} \
            --output-dir /tmp/binpkgs
          BUILD_EXIT=$?
          echo "exit_code=${BUILD_EXIT}" >> "$GITHUB_OUTPUT"
          if [[ $BUILD_EXIT -eq 42 ]]; then
            echo "ERROR: Shared deps did not complete after 3 build phases" >&2
            exit 1
          fi
          if [[ $BUILD_EXIT -ne 0 ]]; then
            exit $BUILD_EXIT
          fi

      - name: Save ccache after phase 3
        if: steps.restore-state.outputs.cache-hit == 'true'
        uses: actions/cache/save@v5
        with:
          path: /var/cache/ccache
          key: ccache-v2-tier1-shared-deps-${{ github.sha }}-${{ github.run_id }}

      - name: Upload packages as artifacts (shared deps phase 3)
        uses: actions/upload-artifact@v7
        if: always() && steps.restore-state.outputs.cache-hit == 'true'
        with:
          name: binpkgs-tier1-shared-phase3
          path: /tmp/binpkgs/**/*.gpkg.tar
          if-no-files-found: warn
          retention-days: 7

  # ───────────────────────────────────────────────────────────────
  # Stage 2: Build consumer packages (qtwebengine, webkit-gtk)
  #          Downloads shared-deps binpkgs to avoid recompiling LLVM
  # ───────────────────────────────────────────────────────────────
  build-phase-1:
    needs: [prepare, build-shared-deps-phase-1, build-shared-deps-phase-2, build-shared-deps-phase-3]
    runs-on: ubuntu-latest
    timeout-minutes: 355
    if: >-
      always() &&
      needs.prepare.result == 'success' &&
      needs.prepare.outputs.has_consumers == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.consumer_matrix) }}
    env:
      CCACHE_SIZE: 20G

    container:
      image: gentoo/stage3:latest
      options: --privileged

    steps:
      - uses: actions/checkout@v6

      - name: Restore ccache
        uses: actions/cache/restore@v5
        with:
          path: /var/cache/ccache
          key: ccache-v2-tier1-${{ matrix.package }}-${{ github.sha }}
          restore-keys: |
            ccache-v2-tier1-${{ matrix.package }}-
            ccache-v2-tier1-

      - name: Download shared deps binpkgs
        uses: actions/download-artifact@v8
        with:
          pattern: binpkgs-tier1-shared-*
          path: /tmp/shared-binpkgs
          merge-multiple: true
        continue-on-error: true

      - name: Import GPG signing key
        run: |
          if [[ -n "${GPG_PRIVATE_KEY:-}" ]]; then
            echo "$GPG_PRIVATE_KEY" \
              | gpg --batch --passphrase "${GPG_PASSPHRASE:-}" \
                    --import
          fi
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Sync portage tree
        run: |
          emerge-webrsync --quiet 2>/dev/null \
            || emerge --sync --quiet \
            || emaint sync -a
          eselect profile set default/linux/amd64/23.0/desktop/plasma || true

      - name: Install build tools
        run: |
          emerge --oneshot --quiet dev-util/ccache app-portage/gentoolkit

      - name: Install shared deps into local binpkg cache
        run: |
          if find /tmp/shared-binpkgs -name '*.gpkg.tar' 2>/dev/null | grep -q .; then
            echo "Installing shared dependency binpkgs into local cache..."
            rsync -a /tmp/shared-binpkgs/ /var/cache/binpkgs/
            # Regenerate Packages index so emerge --usepkg discovers them
            emaint binhost --fix 2>/dev/null || true
            echo "Pre-installed shared deps binpkgs:"
            find /var/cache/binpkgs -name '*.gpkg.tar' | head -20
          else
            echo "No shared dependency binpkgs found (will build deps from source or fetch from remote binhost)"
          fi

      - name: Build package (phase 1)
        id: build
        run: |
          set +e
          bash scripts/build.sh \
            --profile amd64-23.0-desktop-plasma-openrc \
            --single-package "${{ matrix.package }}" \
            --binhost-url "${{ env.BINHOST_URLS }}" \
            --state-dir /var/tmp/portage-state \
            --max-build-time 330 \
            ${{ secrets.GPG_PRIVATE_KEY != '' && '--sign' || '' }} \
            ${{ secrets.GPG_PRIVATE_KEY != '' && format('--gpg-key {0}', secrets.GPG_KEY_FINGERPRINT) || '' }} \
            --output-dir /tmp/binpkgs
          BUILD_EXIT=$?
          echo "exit_code=${BUILD_EXIT}" >> "$GITHUB_OUTPUT"
          if [[ $BUILD_EXIT -ne 0 && $BUILD_EXIT -ne 42 ]]; then
            exit $BUILD_EXIT
          fi

      - name: Save build state to cache (timed out)
        if: steps.build.outputs.exit_code == '42'
        uses: actions/cache/save@v5
        with:
          path: /var/tmp/portage-state
          key: build-state-tier1-${{ matrix.package }}-${{ github.run_id }}-phase-1

      - name: Save ccache after phase 1
        uses: actions/cache/save@v5
        if: always()
        with:
          path: /var/cache/ccache
          key: ccache-v2-tier1-${{ matrix.package }}-${{ github.sha }}-${{ github.run_id }}-ph1

      - name: Upload packages as artifacts (phase 1)
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: binpkgs-tier1-phase1-${{ strategy.job-index }}
          path: /tmp/binpkgs/**/*.gpkg.tar
          if-no-files-found: warn
          retention-days: 7

  build-phase-2:
    needs: [prepare, build-phase-1]
    runs-on: ubuntu-latest
    timeout-minutes: 355
    if: >-
      always() &&
      needs.prepare.result == 'success' &&
      needs.prepare.outputs.has_consumers == 'true' &&
      needs.build-phase-1.result == 'success'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.consumer_matrix) }}
    env:
      CCACHE_SIZE: 20G

    container:
      image: gentoo/stage3:latest
      options: --privileged

    steps:
      - uses: actions/checkout@v6

      - name: Restore build state from phase 1
        id: restore-state
        uses: actions/cache/restore@v5
        with:
          path: /var/tmp/portage-state
          key: build-state-tier1-${{ matrix.package }}-${{ github.run_id }}-phase-1
          fail-on-cache-miss: false

      - name: Restore ccache
        if: steps.restore-state.outputs.cache-hit == 'true'
        uses: actions/cache/restore@v5
        with:
          path: /var/cache/ccache
          key: ccache-v2-tier1-${{ matrix.package }}-${{ github.sha }}-${{ github.run_id }}-ph1
          restore-keys: |
            ccache-v2-tier1-${{ matrix.package }}-${{ github.sha }}-
            ccache-v2-tier1-${{ matrix.package }}-
            ccache-v2-tier1-

      - name: Download shared deps binpkgs
        if: steps.restore-state.outputs.cache-hit == 'true'
        uses: actions/download-artifact@v8
        with:
          pattern: binpkgs-tier1-shared-*
          path: /tmp/shared-binpkgs
          merge-multiple: true
        continue-on-error: true

      - name: Import GPG signing key
        if: steps.restore-state.outputs.cache-hit == 'true'
        run: |
          if [[ -n "${GPG_PRIVATE_KEY:-}" ]]; then
            echo "$GPG_PRIVATE_KEY" \
              | gpg --batch --passphrase "${GPG_PASSPHRASE:-}" \
                    --import
          fi
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Sync portage tree
        if: steps.restore-state.outputs.cache-hit == 'true'
        run: |
          emerge-webrsync --quiet 2>/dev/null \
            || emerge --sync --quiet \
            || emaint sync -a
          eselect profile set default/linux/amd64/23.0/desktop/plasma || true

      - name: Install build tools
        if: steps.restore-state.outputs.cache-hit == 'true'
        run: |
          emerge --oneshot --quiet dev-util/ccache app-portage/gentoolkit

      - name: Install shared deps into local binpkg cache
        if: steps.restore-state.outputs.cache-hit == 'true'
        run: |
          if find /tmp/shared-binpkgs -name '*.gpkg.tar' 2>/dev/null | grep -q .; then
            rsync -a /tmp/shared-binpkgs/ /var/cache/binpkgs/
            emaint binhost --fix 2>/dev/null || true
          fi

      - name: Build package (phase 2)
        id: build
        if: steps.restore-state.outputs.cache-hit == 'true'
        run: |
          set +e
          bash scripts/build.sh \
            --profile amd64-23.0-desktop-plasma-openrc \
            --single-package "${{ matrix.package }}" \
            --binhost-url "${{ env.BINHOST_URLS }}" \
            --resume \
            --state-dir /var/tmp/portage-state \
            --max-build-time 330 \
            ${{ secrets.GPG_PRIVATE_KEY != '' && '--sign' || '' }} \
            ${{ secrets.GPG_PRIVATE_KEY != '' && format('--gpg-key {0}', secrets.GPG_KEY_FINGERPRINT) || '' }} \
            --output-dir /tmp/binpkgs
          BUILD_EXIT=$?
          echo "exit_code=${BUILD_EXIT}" >> "$GITHUB_OUTPUT"
          if [[ $BUILD_EXIT -ne 0 && $BUILD_EXIT -ne 42 ]]; then
            exit $BUILD_EXIT
          fi

      - name: Save build state to cache (timed out)
        if: steps.build.outputs.exit_code == '42'
        uses: actions/cache/save@v5
        with:
          path: /var/tmp/portage-state
          key: build-state-tier1-${{ matrix.package }}-${{ github.run_id }}-phase-2

      - name: Save ccache after phase 2
        if: steps.restore-state.outputs.cache-hit == 'true'
        uses: actions/cache/save@v5
        with:
          path: /var/cache/ccache
          key: ccache-v2-tier1-${{ matrix.package }}-${{ github.sha }}-${{ github.run_id }}-ph2

      - name: Upload packages as artifacts (phase 2)
        uses: actions/upload-artifact@v7
        if: always() && steps.restore-state.outputs.cache-hit == 'true'
        with:
          name: binpkgs-tier1-phase2-${{ strategy.job-index }}
          path: /tmp/binpkgs/**/*.gpkg.tar
          if-no-files-found: warn
          retention-days: 7

  build-phase-3:
    needs: [prepare, build-phase-2]
    runs-on: ubuntu-latest
    timeout-minutes: 355
    if: >-
      always() &&
      needs.prepare.result == 'success' &&
      needs.prepare.outputs.has_consumers == 'true' &&
      needs.build-phase-2.result == 'success'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.consumer_matrix) }}
    env:
      CCACHE_SIZE: 20G

    container:
      image: gentoo/stage3:latest
      options: --privileged

    steps:
      - uses: actions/checkout@v6

      - name: Restore build state from phase 2
        id: restore-state
        uses: actions/cache/restore@v5
        with:
          path: /var/tmp/portage-state
          key: build-state-tier1-${{ matrix.package }}-${{ github.run_id }}-phase-2
          fail-on-cache-miss: false

      - name: Restore ccache
        if: steps.restore-state.outputs.cache-hit == 'true'
        uses: actions/cache/restore@v5
        with:
          path: /var/cache/ccache
          key: ccache-v2-tier1-${{ matrix.package }}-${{ github.sha }}-${{ github.run_id }}-ph2
          restore-keys: |
            ccache-v2-tier1-${{ matrix.package }}-${{ github.sha }}-
            ccache-v2-tier1-${{ matrix.package }}-
            ccache-v2-tier1-

      - name: Download shared deps binpkgs
        if: steps.restore-state.outputs.cache-hit == 'true'
        uses: actions/download-artifact@v8
        with:
          pattern: binpkgs-tier1-shared-*
          path: /tmp/shared-binpkgs
          merge-multiple: true
        continue-on-error: true

      - name: Import GPG signing key
        if: steps.restore-state.outputs.cache-hit == 'true'
        run: |
          if [[ -n "${GPG_PRIVATE_KEY:-}" ]]; then
            echo "$GPG_PRIVATE_KEY" \
              | gpg --batch --passphrase "${GPG_PASSPHRASE:-}" \
                    --import
          fi
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Sync portage tree
        if: steps.restore-state.outputs.cache-hit == 'true'
        run: |
          emerge-webrsync --quiet 2>/dev/null \
            || emerge --sync --quiet \
            || emaint sync -a
          eselect profile set default/linux/amd64/23.0/desktop/plasma || true

      - name: Install build tools
        if: steps.restore-state.outputs.cache-hit == 'true'
        run: |
          emerge --oneshot --quiet dev-util/ccache app-portage/gentoolkit

      - name: Install shared deps into local binpkg cache
        if: steps.restore-state.outputs.cache-hit == 'true'
        run: |
          if find /tmp/shared-binpkgs -name '*.gpkg.tar' 2>/dev/null | grep -q .; then
            rsync -a /tmp/shared-binpkgs/ /var/cache/binpkgs/
            emaint binhost --fix 2>/dev/null || true
          fi

      - name: Build package (phase 3)
        id: build
        if: steps.restore-state.outputs.cache-hit == 'true'
        run: |
          set +e
          bash scripts/build.sh \
            --profile amd64-23.0-desktop-plasma-openrc \
            --single-package "${{ matrix.package }}" \
            --binhost-url "${{ env.BINHOST_URLS }}" \
            --resume \
            --state-dir /var/tmp/portage-state \
            --max-build-time 330 \
            ${{ secrets.GPG_PRIVATE_KEY != '' && '--sign' || '' }} \
            ${{ secrets.GPG_PRIVATE_KEY != '' && format('--gpg-key {0}', secrets.GPG_KEY_FINGERPRINT) || '' }} \
            --output-dir /tmp/binpkgs
          BUILD_EXIT=$?
          echo "exit_code=${BUILD_EXIT}" >> "$GITHUB_OUTPUT"
          if [[ $BUILD_EXIT -eq 42 ]]; then
            echo "ERROR: ${{ matrix.package }} did not complete after 3 build phases" >&2
            exit 1
          fi
          if [[ $BUILD_EXIT -ne 0 ]]; then
            exit $BUILD_EXIT
          fi

      - name: Save ccache after phase 3
        if: steps.restore-state.outputs.cache-hit == 'true'
        uses: actions/cache/save@v5
        with:
          path: /var/cache/ccache
          key: ccache-v2-tier1-${{ matrix.package }}-${{ github.sha }}-${{ github.run_id }}

      - name: Upload packages as artifacts (phase 3)
        uses: actions/upload-artifact@v7
        if: always() && steps.restore-state.outputs.cache-hit == 'true'
        with:
          name: binpkgs-tier1-phase3-${{ strategy.job-index }}
          path: /tmp/binpkgs/**/*.gpkg.tar
          if-no-files-found: warn
          retention-days: 7

  # ───────────────────────────────────────────────────────────────
  # Publish all artifacts to GitHub Pages
  # ───────────────────────────────────────────────────────────────
  publish:
    needs: [build-shared-deps-phase-1, build-shared-deps-phase-2, build-shared-deps-phase-3, build-phase-1, build-phase-2, build-phase-3]
    if: >-
      always() &&
      !cancelled()
    uses: ./.github/workflows/publish-to-pages.yml
    secrets: inherit
