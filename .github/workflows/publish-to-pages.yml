name: Publish to GitHub Pages

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      chain_id:
        description: 'Build chain ID for cache key (passed by build workflow)'
        required: false
        type: string
        default: ''

# Only one publish job runs at a time to avoid index corruption
concurrency:
  group: pages-publish
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v6

      # Restore previously-published site from cache so that packages from
      # earlier builds (or earlier attempts in a resume chain) are preserved.
      # The key is intentionally a never-matching placeholder so the lookup
      # always falls through to restore-keys, which return the newest cache
      # whose key starts with the given prefix — first scoped to this resume
      # chain, then any historical cache as a last resort.
      - name: Restore existing Pages content from cache
        uses: actions/cache/restore@v5
        with:
          path: /tmp/pages-site
          key: pages-site-placeholder-never-matches
          restore-keys: |
            pages-site-${{ inputs.chain_id || github.run_id }}-
            pages-site-

      - name: Ensure site directory exists
        run: mkdir -p /tmp/pages-site

      # Download all binpkg artifacts produced by the current or recent runs
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: /tmp/artifacts
          pattern: binpkgs-*
          merge-multiple: false
        continue-on-error: true  # OK if no artifacts exist yet (first run)

      # Organise packages into the standard binhost directory layout
      - name: Organise packages
        run: |
          BINHOST_PATH="amd64/23.0/desktop/plasma/openrc/x86-64-v3"
          DEST="/tmp/pages-site/${BINHOST_PATH}"
          mkdir -p "$DEST"

          # Copy every .gpkg.tar (and optional .asc signatures) we found
          find /tmp/artifacts -name '*.gpkg.tar' | while read -r pkg; do
            # Preserve category/name-version subdirectory structure
            # Artifacts are stored as category/name/name-version.gpkg.tar
            rel_dir="$(dirname "$pkg" | sed 's|.*/binpkgs-[^/]*/||')"
            target="${DEST}/${rel_dir}"
            mkdir -p "$target"
            cp "$pkg" "$target/"
            # Copy matching .asc signature if present
            if [[ -f "${pkg}.asc" ]]; then cp "${pkg}.asc" "$target/"; fi
          done

          echo "Package tree:"
          find "$DEST" -type f | sort

      # Prune older versions per atom *before* indexing.  GitHub Pages enforces
      # a soft 1 GB site-size limit; once we exceed it the published binhost
      # becomes unreachable.  Every bumped ebuild that gets rebuilt leaves a
      # stale gpkg behind in the cached site layout (no Portage process ever
      # touches the cache to clean them), so without periodic pruning the
      # site grows monotonically.  Keep only the newest version per
      # (category, PN); clients always want the latest anyway.
      - name: Prune older package versions
        run: |
          BINHOST_PATH="amd64/23.0/desktop/plasma/openrc/x86-64-v3"
          DEST="/tmp/pages-site/${BINHOST_PATH}"
          if [[ -d "$DEST" ]]; then
            python3 scripts/prune-old-binpkgs.py "$DEST"
          fi
          # Surface remaining size so a future "still over 1 GB" failure is
          # diagnosable from the workflow log alone.
          echo "Site size after pruning:"
          du -sh /tmp/pages-site
          # Default to 0 so a missing/empty dir doesn't crash the numeric
          # comparison below under `set -e`.
          SITE_BYTES="$(du -sb /tmp/pages-site | awk '{print $1+0}')"
          SITE_BYTES="${SITE_BYTES:-0}"
          # GitHub Pages soft limit is 1 GiB.  Warn (don't fail) at 900 MiB so
          # we have time to react before the next build pushes us over.
          if [[ "$SITE_BYTES" -gt $((900 * 1024 * 1024)) ]]; then
            echo "::warning title=Pages site size::Pages site is ${SITE_BYTES} bytes (>900 MiB). Approaching the 1 GiB GitHub Pages limit; consider trimming packages/packages.txt."
          fi

      # Generate/refresh the Packages index
      - name: Generate Packages index
        run: |
          BINHOST_PATH="amd64/23.0/desktop/plasma/openrc/x86-64-v3"
          DEST="/tmp/pages-site/${BINHOST_PATH}"
          bash scripts/generate-packages-index.sh "$DEST"

      # Add a minimal index.html so GitHub Pages serves something at the root
      - name: Create root index
        run: |
          cat > /tmp/pages-site/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head><meta charset="utf-8"><title>Gentoo Binhost</title></head>
          <body>
          <h1>Gentoo Binhost</h1>
          <p>Binary packages for <code>default/linux/amd64/23.0/desktop/plasma</code>
             (OpenRC, ~amd64, x86-64-v3).</p>
          <p>See the <a href="https://github.com/naelolaiz/gentoo-binhost">repository</a>
             for usage instructions.</p>
          <pre>
          PORTAGE_BINHOST="https://naelolaiz.github.io/gentoo-binhost/amd64/23.0/desktop/plasma/openrc/x86-64-v3"
          </pre>
          </body>
          </html>
          EOF

      # Persist the assembled site so future publishes can merge incrementally.
      # The key MUST include something unique per attempt (github.run_id of
      # the publish run differs per resume) — otherwise the second publish
      # in a chain tries to reserve the same key as the first and fails with
      # "another job may be creating this cache", silently dropping packages
      # produced by later attempts.  The chain-scoped prefix (chain_id) is
      # what the restore-keys above match against.
      - name: Cache Pages content for future builds
        uses: actions/cache/save@v5
        with:
          path: /tmp/pages-site
          key: pages-site-${{ inputs.chain_id || github.run_id }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: /tmp/pages-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
