name: Accept Local Packages

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'contrib/**/*.gpkg.tar'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate contributed packages
        run: |
          echo "Validating contributed .gpkg.tar files..."
          ERRORS=0
          FOUND=0

          while IFS= read -r -d '' pkg; do
            echo "Checking: ${pkg}"
            FOUND=$((FOUND + 1))

            # Must be a regular file
            if [[ ! -f "$pkg" ]]; then
              echo "  ERROR: Not a regular file"
              ERRORS=$((ERRORS + 1))
              continue
            fi

            # Must have .gpkg.tar extension
            if [[ "$pkg" != *.gpkg.tar ]]; then
              echo "  ERROR: Not a .gpkg.tar file"
              ERRORS=$((ERRORS + 1))
              continue
            fi

            # Must be a valid tar archive
            if ! tar --list -f "$pkg" >/dev/null; then
              echo "  ERROR: Not a valid tar archive"
              ERRORS=$((ERRORS + 1))
              continue
            fi

            # gpkg archives must contain a METADATA directory or package.tar
            MEMBERS=$(tar --list -f "$pkg")
            if ! echo "$MEMBERS" | grep -qE '(^|/)gpkg-1$|(^|/)image\.tar\.(zst|bz2|gz|xz)$'; then
              echo "  WARNING: Does not look like a valid GPKG (missing image.tar.*)"
            fi

            echo "  OK"
          done < <(find contrib/ -name '*.gpkg.tar' -print0)

          if [[ $FOUND -eq 0 ]]; then
            echo "ERROR: No .gpkg.tar files found under contrib/"
            exit 1
          fi

          echo ""
          echo "Validated ${FOUND} package(s), ${ERRORS} error(s)."
          [[ $ERRORS -eq 0 ]] || exit 1

      - name: Check path structure
        run: |
          # Packages must live under the canonical layout:
          #   contrib/<arch>/<profile-version>/<desktop>/<variant>/<init>/<march>/<category>/<pn>-<ver>.gpkg.tar
          # = exactly 8 path components after stripping `contrib/`.
          # A strict structural regex catches BOTH too-shallow and
          # too-deep paths — the earlier `depth -lt 8` check silently
          # accepted deeper paths, letting a malformed submission through.
          #
          # Field shapes:
          #   arch/march:      [a-z0-9][a-z0-9._+-]*    (e.g. amd64, znver3, x86-64-v3)
          #   profile version: [0-9][0-9.]*             (e.g. 23.0)
          #   desktop/variant/init: [a-z][a-z0-9-]*     (e.g. plasma, openrc)
          #   category:        [a-z][a-z0-9-]*          (Gentoo category)
          #   basename:        <pn>-<version>.gpkg.tar (PMS-ish; PN must start with a letter or digit, version with a digit)
          echo "Checking path structure..."
          ERRORS=0
          pattern='^contrib/[a-z0-9][a-z0-9._+-]*/[0-9][0-9.]*/[a-z][a-z0-9-]*/[a-z][a-z0-9-]*/[a-z][a-z0-9-]*/[a-z0-9][a-z0-9._+-]*/[a-z][a-z0-9-]*/[A-Za-z0-9_+][A-Za-z0-9._+-]*-[0-9][A-Za-z0-9._+-]*\.gpkg\.tar$'

          while IFS= read -r -d '' pkg; do
            if [[ "$pkg" =~ $pattern ]]; then
              echo "  OK: ${pkg}"
            else
              echo "  ERROR: ${pkg} — path does not match contrib/<arch>/<ver>/<desktop>/<variant>/<init>/<march>/<cat>/<pn>-<ver>.gpkg.tar"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(find contrib/ -name '*.gpkg.tar' -print0)

          [[ $ERRORS -eq 0 ]] || exit 1
