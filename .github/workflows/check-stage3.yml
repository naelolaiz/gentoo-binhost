name: Check Stage3 Update

on:
  schedule:
    # Weekly on Monday at 08:00 UTC — offset from the Sunday build to avoid racing it
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  actions: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for newer stage3
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Read the pinned tag from the workflow file (single source of truth)
          PINNED=$(grep -oP '(?<=STAGE3_TAG: )amd64-openrc-\d+' .github/workflows/build-packages.yml | head -1)
          if [[ -z "$PINNED" ]]; then
            echo "::error::Could not parse STAGE3_TAG from build-packages.yml"
            exit 1
          fi
          echo "Pinned stage3 tag: ${PINNED}"

          # Query the Docker Registry v2 API (same protocol docker pull uses — reliable)
          REGISTRY_TOKEN=$(curl -fsSL --max-time 30 \
            "https://auth.docker.io/token?service=registry.docker.io&scope=repository:gentoo/stage3:pull" | \
            jq -r .token)
          LATEST=$(curl -fsSL --max-time 30 \
            -H "Authorization: Bearer ${REGISTRY_TOKEN}" \
            "https://registry-1.docker.io/v2/gentoo/stage3/tags/list" | \
            jq -r '[.tags[] | select(startswith("amd64-openrc-2"))] | sort | last // ""')
          if [[ -z "$LATEST" ]]; then
            echo "::error::Could not determine latest stage3 tag from Docker Registry"
            exit 1
          fi
          echo "Latest stage3 tag: ${LATEST}"

          if [[ "$PINNED" == "$LATEST" ]]; then
            echo "Stage3 is up to date — nothing to do"
            exit 0
          fi
          echo "Newer stage3 available: ${PINNED} → ${LATEST}"

          # Never suggest an update while a build chain is in progress.
          # Changing the stage3 mid-chain would invalidate all caches, losing all
          # prior build progress and corrupting the resume chain.
          ACTIVE=$(gh api "repos/${{ github.repository }}/actions/workflows/build-packages.yml/runs" \
            --jq '[.workflow_runs[] | select(.status == "in_progress" or .status == "queued" or .status == "waiting")] | length')
          if [[ "$ACTIVE" -gt 0 ]]; then
            echo "Active build chain detected (${ACTIVE} run(s) in progress/queued) — deferring notification"
            exit 0
          fi

          # Avoid filing duplicate issues for the same latest tag
          EXISTING=$(gh issue list --state open --json title \
            --jq "[.[] | select(.title | contains(\"${LATEST}\"))] | length")
          if [[ "$EXISTING" -gt 0 ]]; then
            echo "Issue for ${LATEST} already open — skipping"
            exit 0
          fi

          BODY_FILE=$(mktemp)
          {
            echo "A newer Gentoo stage3 image is available."
            echo ""
            echo "**Pinned:** \`${PINNED}\`"
            echo "**Available:** \`${LATEST}\`"
            echo ""
            echo "## How to update"
            echo ""
            echo "Run the sync tool from the repo root — it rewrites every stage3 tag reference across every workflow atomically and then verifies no drift:"
            echo ""
            echo "\`\`\`bash"
            echo "bash scripts/sync-stage3-tag.sh --write ${LATEST}"
            echo "\`\`\`"
            echo ""
            echo "Commit the result in its own PR. The Lint workflow's \`stage3-tag-drift\` job and the build workflow's \`Verify stage3 tag consistency\` step both invoke \`sync-stage3-tag.sh --check\`, so any missed reference fails CI red."
            echo ""
            echo "## Important"
            echo ""
            echo "Updating the stage3 tag **invalidates all caches** (the tag is part of every cache key)."
            echo "The next build will start from scratch. Only apply this update when no build chain is active."
          } > "$BODY_FILE"
          gh issue create \
            --title "stage3 update available: ${PINNED} -> ${LATEST}" \
            --body-file "$BODY_FILE"
