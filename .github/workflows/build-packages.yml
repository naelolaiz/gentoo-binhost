name: Build Packages

run-name: >-
  Build Packages${{ inputs.phase && inputs.phase != '1' && format(' (phase {0})', inputs.phase) || '' }}

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight UTC
  workflow_dispatch:
    inputs:
      package:
        description: 'Single package to build (leave empty to build all)'
        required: false
        default: ''
      phase:
        description: 'Build phase (used by auto-continuation — do not set manually)'
        required: false
        default: '1'
      chain_id:
        description: 'Chain ID (used by auto-continuation — do not set manually)'
        required: false
        default: ''
      max_phases:
        description: 'Maximum number of build phases before giving up'
        required: false
        default: '8'

# Only one build chain runs at a time; new triggers queue instead of cancelling.
concurrency:
  group: build-packages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write          # needed for self-re-triggering

env:
  # Our own binhost first (custom USE flags), then official Gentoo x86-64-v3 as fallback
  BINHOST_URLS: >-
    https://naelolaiz.github.io/gentoo-binhost/amd64/23.0/desktop/plasma/openrc/x86-64-v3
    https://distfiles.gentoo.org/releases/amd64/binpackages/23.0/x86-64-v3/

jobs:
  # ─── Build ──────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    container:
      image: gentoo/stage3:latest
      options: --privileged
    env:
      CCACHE_SIZE: 20G
    outputs:
      should_continue: ${{ steps.result.outputs.should_continue }}
      chain_id: ${{ steps.meta.outputs.chain_id }}
      next_phase: ${{ steps.meta.outputs.next_phase }}

    steps:
      - name: Set up build chain metadata
        id: meta
        run: |
          PHASE="${{ inputs.phase || '1' }}"
          CHAIN_ID="${{ inputs.chain_id || github.run_id }}"
          echo "phase=${PHASE}" >> "$GITHUB_OUTPUT"
          echo "chain_id=${CHAIN_ID}" >> "$GITHUB_OUTPUT"
          echo "next_phase=$((PHASE + 1))" >> "$GITHUB_OUTPUT"
          echo "::notice::Phase ${PHASE} of chain ${CHAIN_ID}"

      - name: Validate inputs
        if: inputs.package != ''
        run: |
          PKG="${{ inputs.package }}"
          if [[ ! "$PKG" =~ ^[a-zA-Z0-9._-]+/[a-zA-Z0-9._+-]+$ ]]; then
            echo "::error::Invalid package name: ${PKG}"
            echo "Expected format: category/package-name (e.g. dev-qt/qtwebengine)"
            exit 1
          fi

      - uses: actions/checkout@v6

      - name: Restore ccache
        uses: actions/cache/restore@v5
        with:
          path: /var/cache/ccache
          key: ccache-${{ steps.meta.outputs.chain_id }}-ph${{ steps.meta.outputs.phase }}
          restore-keys: |
            ccache-${{ steps.meta.outputs.chain_id }}-
            ccache-

      - name: Import GPG signing key
        run: |
          if [[ -n "${GPG_PRIVATE_KEY:-}" ]]; then
            echo "$GPG_PRIVATE_KEY" \
              | gpg --batch --passphrase "${GPG_PASSPHRASE:-}" --import
          fi
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Sync portage tree
        run: |
          emerge-webrsync --quiet 2>/dev/null \
            || emerge --sync --quiet \
            || emaint sync -a
          eselect profile set default/linux/amd64/23.0/desktop/plasma || true

      - name: Install build tools
        run: |
          emerge --oneshot --quiet dev-util/ccache app-portage/gentoolkit

      - name: Restore build state from previous phase
        if: inputs.phase && inputs.phase != '1'
        uses: actions/cache/restore@v5
        with:
          path: /var/tmp/portage-state
          key: build-state-${{ steps.meta.outputs.chain_id }}-ph${{ steps.meta.outputs.phase }}
          fail-on-cache-miss: false

      - name: Build packages
        id: build
        run: |
          set +e
          bash scripts/build.sh \
            --profile amd64-23.0-desktop-plasma-openrc \
            ${{ inputs.package && format('--single-package {0}', inputs.package) || '--package-list packages/packages.txt' }} \
            --binhost-url "${{ env.BINHOST_URLS }}" \
            --state-dir /var/tmp/portage-state \
            --max-build-time 330 \
            ${{ (inputs.phase || '1') != '1' && '--resume' || '' }} \
            ${{ secrets.GPG_PRIVATE_KEY != '' && '--sign' || '' }} \
            ${{ secrets.GPG_PRIVATE_KEY != '' && format('--gpg-key {0}', secrets.GPG_KEY_FINGERPRINT) || '' }} \
            --output-dir /tmp/binpkgs
          BUILD_EXIT=$?
          echo "exit_code=${BUILD_EXIT}" >> "$GITHUB_OUTPUT"
          if [[ $BUILD_EXIT -ne 0 && $BUILD_EXIT -ne 42 ]]; then
            exit $BUILD_EXIT
          fi

      - name: Save build state for next phase
        if: always() && steps.build.outputs.exit_code == '42'
        uses: actions/cache/save@v5
        with:
          path: /var/tmp/portage-state
          key: build-state-${{ steps.meta.outputs.chain_id }}-ph${{ steps.meta.outputs.next_phase }}

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: /var/cache/ccache
          key: ccache-${{ steps.meta.outputs.chain_id }}-ph${{ steps.meta.outputs.phase }}

      - name: Upload packages
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: binpkgs-phase-${{ steps.meta.outputs.phase }}
          path: /tmp/binpkgs/**/*.gpkg.tar
          if-no-files-found: warn
          retention-days: 7

      - name: Determine if build should continue
        id: result
        if: always()
        run: |
          EXIT="${{ steps.build.outputs.exit_code || '1' }}"
          MAX="${{ inputs.max_phases || '8' }}"
          NEXT="${{ steps.meta.outputs.next_phase }}"
          if [[ "$EXIT" == "42" && "$NEXT" -le "$MAX" ]]; then
            echo "should_continue=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_continue=false" >> "$GITHUB_OUTPUT"
          fi
          if [[ "$EXIT" == "42" && "$NEXT" -gt "$MAX" ]]; then
            echo "::warning::Build did not complete after ${MAX} phases. Consider increasing max_phases."
          fi

  # ─── Publish to GitHub Pages ────────────────────────────────────
  publish:
    needs: build
    if: always() && !cancelled()
    uses: ./.github/workflows/publish-to-pages.yml
    secrets: inherit

  # ─── Auto-continue: re-trigger if the build timed out ──────────
  continue:
    needs: [build, publish]
    if: always() && !cancelled() && needs.build.outputs.should_continue == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Trigger next build phase
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NEXT_PHASE="${{ needs.build.outputs.next_phase }}"
          CHAIN_ID="${{ needs.build.outputs.chain_id }}"
          MAX_PHASES="${{ inputs.max_phases || '8' }}"
          echo "Triggering phase ${NEXT_PHASE} (chain ${CHAIN_ID}, max ${MAX_PHASES})"
          curl -f -X POST \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/build-packages.yml/dispatches" \
            -d "{\"ref\":\"${{ github.ref_name }}\",\"inputs\":{\"phase\":\"${NEXT_PHASE}\",\"chain_id\":\"${CHAIN_ID}\",\"max_phases\":\"${MAX_PHASES}\"}}"
