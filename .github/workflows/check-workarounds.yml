name: Check Workarounds

on:
  schedule:
    # Weekly on Wednesday at 06:00 UTC
    - cron: '0 6 * * 3'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    container:
      image: gentoo/stage3:latest
    outputs:
      removable: ${{ steps.check.outputs.removable }}
    steps:
      - uses: actions/checkout@v6

      - name: Sync portage tree
        run: bash scripts/sync-portage.sh

      - name: Run workaround checks
        id: check
        run: |
          python3 - << 'PY'
          import json, os, subprocess, sys

          with open('config/workarounds.json') as f:
              workarounds = json.load(f)

          removable = []

          for w in workarounds:
              key = w['key']
              chk = w['check']
              kind = chk['type']
              pkg  = chk['package']

              if kind == 'iuse':
                  args = [pkg, chk['flag']]
              elif kind == 'dep-grep':
                  args = [pkg, chk['pattern'], str(chk.get('present_means_needed', True)).lower()]
              elif kind == 'required-use-grep':
                  args = [pkg, chk['pattern']]
              elif kind == 'version-gt':
                  args = [pkg, chk['pinned']]
              else:
                  print(f'::error::Unknown check type {kind!r} for {key}', flush=True)
                  sys.exit(1)

              result = subprocess.run(
                  ['bash', 'scripts/check-workaround.sh', kind] + args,
                  capture_output=True, text=True,
              )
              status = result.stdout.strip()
              # stderr carries the human-readable diagnostic; print it as a notice
              for line in result.stderr.splitlines():
                  print(f'::notice::{key}: {line.strip()}', flush=True)
              if result.returncode != 0 or status not in ('needed', 'removable', 'unknown'):
                  print(f'::error::check-workaround.sh failed for {key} (rc={result.returncode}, out={status!r})', flush=True)
                  sys.exit(1)

              if status == 'removable':
                  removable.append(key)
                  print(f'::warning::{key} workaround may be removable', flush=True)
              elif status == 'needed':
                  print(f'::notice::{key} workaround is still needed', flush=True)

          github_output = os.environ.get('GITHUB_OUTPUT', '')
          if github_output:
              with open(github_output, 'a') as f:
                  f.write(f"removable={','.join(removable)}\n")

          if removable:
              print(f"::warning::Workarounds that may be removable: {','.join(removable)}", flush=True)
          else:
              print('::notice::All workarounds are still needed', flush=True)
          PY

  notify:
    needs: check
    if: needs.check.outputs.removable != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create issues for removable workarounds
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const workarounds = JSON.parse(fs.readFileSync('config/workarounds.json', 'utf8'));
            const byKey = Object.fromEntries(workarounds.map(w => [w.key, w]));

            const removable = '${{ needs.check.outputs.removable }}'.split(',').filter(Boolean);
            const repoUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}`;
            const workflowLink = `[check-workarounds](${repoUrl}/actions/workflows/check-workarounds.yml)`;

            // Fetch existing open issues with our label once
            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'workaround-check',
            });

            for (const key of removable) {
              const w = byKey[key];
              if (!w) {
                console.log(`No config entry for key '${key}' — skipping`);
                continue;
              }
              if (existingIssues.some(i => i.title === w.title)) {
                console.log(`Issue already exists for ${key}, skipping`);
                continue;
              }
              const body = w.body_lines.join('\n')
                + `\n\n_Created automatically by the ${workflowLink} workflow._`;
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: w.title,
                body,
                labels: ['workaround-check'],
              });
              console.log(`Created issue for ${key}`);
            }
